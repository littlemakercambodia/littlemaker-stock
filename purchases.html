<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Littlemaker - ការទិញ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-title">🏪 Littlemaker</div>
      <span class="logo-sub" data-t="app_tagline">ប្រព័ន្ធគ្រប់គ្រងអាជីវកម្ម</span>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">MENU</div>
      <a href="index.html" class="nav-link"><span class="nav-icon">📊</span><span data-t="nav_dashboard">ផ្ទាំងគ្រប់គ្រង</span></a>
      <a href="products.html" class="nav-link"><span class="nav-icon">📦</span><span data-t="nav_products">ផលិតផល</span></a>
      <a href="sales.html" class="nav-link"><span class="nav-icon">💰</span><span data-t="nav_sales">ការលក់</span></a>
      <a href="purchases.html" class="nav-link active"><span class="nav-icon">🛒</span><span data-t="nav_purchases">ការទិញ</span></a>
      <div class="nav-section-label">SYSTEM</div>
      <a href="settings.html" class="nav-link"><span class="nav-icon">⚙️</span><span data-t="nav_settings">ការកំណត់</span></a>
    </nav>
    <div class="sidebar-footer">
      <div class="lang-switcher">
        <button class="lang-btn" data-lang="km">🇰🇭 ខ្មែរ</button>
        <button class="lang-btn" data-lang="en">🇬🇧 EN</button>
      </div>
    </div>
  </aside>

  <div class="main">
    <header class="header">
      <div class="header-left">
        <button class="sidebar-toggle" id="sidebar-toggle">☰</button>
        <div>
          <div class="page-title" data-t="manage_purchases">គ្រប់គ្រងការទិញ</div>
          <div class="page-subtitle" data-t="purchase_history">ប្រវត្តិការទិញ</div>
        </div>
      </div>
      <div class="header-right">
        <div id="header-user"></div>
        <button class="btn-icon-header" id="btn-print" title="Print">🖨️</button>
        <button class="btn-icon-header" id="btn-notif">🔔<span class="notif-badge" id="notif-count" style="display:none">0</span></button>
        <button class="btn-icon-header" id="btn-theme">🌙</button>
        <button class="btn-primary" id="btn-add">+ <span data-t="add_purchase">កត់ត្រាការទិញ</span></button>
      </div>
    </header>

    <div class="content">
      <div class="toolbar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" class="search-input" id="search-input" data-tp="search">
        </div>
        <select class="filter-select" id="date-filter">
          <option value="" data-t="all_time">ទាំងអស់</option>
          <option value="today" data-t="today">ថ្ងៃនេះ</option>
          <option value="week" data-t="this_week">សប្តាហ៍នេះ</option>
          <option value="month" data-t="this_month">ខែនេះ</option>
        </select>
        <button class="btn-toolbar" id="btn-csv">📥 <span data-t="export_csv">CSV</span></button>
        <button class="btn-toolbar print" onclick="printPage()">🖨️ <span data-t="print_page">បោះពុម្ព</span></button>
      </div>

      <div class="summary-bar" style="border-color:var(--primary);">
        <div class="summary-item">
          <span class="summary-label" data-t="total_purchases">តម្លៃទិញសរុប</span>
          <span class="summary-val text-primary" id="purchases-total-val">0 ៛</span>
        </div>
        <div class="summary-item">
          <span class="summary-label" data-t="total_products">ចំនួន</span>
          <span class="summary-val" id="purchases-count-val">0</span>
        </div>
      </div>

      <div class="card" style="padding:0;overflow:hidden;">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th style="width:40px">#</th>
              <th data-t="date">កាលបរិច្ឆេទ</th>
              <th data-t="product">ផលិតផល / អ្នកផ្គត់ផ្គង់</th>
              <th data-t="quantity" class="text-right">បរិមាណ</th>
              <th data-t="unit_price" class="text-right">តម្លៃ/ឯកតា</th>
              <th data-t="total" class="text-right">សរុប</th>
              <th data-t="actions" style="width:60px">សកម្មភាព</th>
            </tr></thead>
            <tbody id="purchases-list">
              <tr><td colspan="7" class="no-data">កំពុងផ្ទុក...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title"></div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer">
      <button class="btn-cancel" id="modal-cancel">បោះបង់</button>
      <button class="btn-save" id="modal-save">រក្សាទុក</button>
    </div>
  </div>
</div>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>


<script src="js/auth.js"></script>
<script src="js/lang.js"></script>
<script src="js/storage.js"></script>
<script src="js/main.js"></script>
<script src="js/purchases.js"></script>
</body>
</html>
